# .github/workflows/upgrade-image.yml
# Pulls the latest labro image, refreshes secrets, and recreates the container.
# Triggered automatically via repository_dispatch (labro-release) when a new image is published
# by rssrn/labro, or run manually via Actions → Run workflow.
#
# Host layout (all persistent state under /opt/labro/data, mounted to /data):
#   /opt/labro/.env                  — secrets (outside mount; read by docker at run time)
#   /opt/labro/data/labro.toml       — config
#   /opt/labro/data/labro.db         — SQLite
#   /opt/labro/data/labro.log        — run log
#   /opt/labro/data/repos/           — cloned repos
#   /opt/labro/data/codex/auth.json  — codex CLI auth (symlinked to ~/.codex/auth.json)
#
# Required repo secrets:
#   TAILSCALE_AUTHKEY              — ephemeral auth key from Tailscale admin (Actions → Keys)
#   DEPLOY_HOST                    — user@hostname (Tailscale hostname), e.g. ubuntu@my-oci-vm
#   GH_APP_PRIVATE_KEY_BASE64  — base64 -w 0 labro-bot.pem
#
# Optional repo secrets (include whichever agents you use):
#   CLAUDE_CODE_OAUTH_TOKEN        — from: claude setup-token
#   OPENROUTER_API_KEY             — for opencode with openrouter provider
#   CODEX_API_KEY                  — for codex agent via OpenAI API billing
#   CODEX_AUTH_JSON_BASE64         — for codex agent via CLI subscription billing
#                                    (base64 -w 0 ~/.codex/auth.json)
#                                    bind-mounted so headless token refresh persists
on:
  workflow_dispatch:
  repository_dispatch:
    types: [labro-release]

jobs:
  upgrade-image:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --advertise-tags=tag:github-runner

      - name: Write env file
        env:
          GH_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_APP_PRIVATE_KEY_BASE64 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          {
            printf 'LABRO_CONFIG=/data/labro.toml\n'
            printf 'LABRO_REPOS_DIR=/data/repos\n'
            printf 'GH_APP_PRIVATE_KEY_BASE64=%s\n' "$GH_APP_PRIVATE_KEY_BASE64"
            [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] && printf 'CLAUDE_CODE_OAUTH_TOKEN=%s\n' "$CLAUDE_CODE_OAUTH_TOKEN"
            [ -n "$OPENROUTER_API_KEY" ]      && printf 'OPENROUTER_API_KEY=%s\n'      "$OPENROUTER_API_KEY"
            [ -n "$CODEX_API_KEY" ]           && printf 'CODEX_API_KEY=%s\n'           "$CODEX_API_KEY"
          } > /tmp/labro.env
          chmod 600 /tmp/labro.env

      - name: Write codex auth file
        env:
          CODEX_AUTH_JSON_BASE64: ${{ secrets.CODEX_AUTH_JSON_BASE64 }}
        run: |
          if [ -n "$CODEX_AUTH_JSON_BASE64" ]; then
            printf '%s' "$CODEX_AUTH_JSON_BASE64" | base64 -d > /tmp/codex-auth.json
            chmod 600 /tmp/codex-auth.json
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ secrets.DEPLOY_HOST }} 'mkdir -p /opt/labro/data/codex'
            scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              /tmp/codex-auth.json ${{ secrets.DEPLOY_HOST }}:/opt/labro/data/codex/auth.json
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              ${{ secrets.DEPLOY_HOST }} 'chmod 600 /opt/labro/data/codex/auth.json'
          fi

      - name: Copy env file to host
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.DEPLOY_HOST }} 'mkdir -p /opt/labro/data'
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            /tmp/labro.env ${{ secrets.DEPLOY_HOST }}:/opt/labro/.env
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.DEPLOY_HOST }} 'chmod 600 /opt/labro/.env'

      - name: Pull latest image and replace container
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            ${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -euo pipefail
            IMAGE="ghcr.io/rssrn/labro:latest"

            echo "Pulling $IMAGE..."
            docker pull "$IMAGE"

            echo "Draining in-flight runs..."
            docker exec labro touch /data/LABRO_DISABLED 2>/dev/null || true
            while [ "$(docker exec labro sqlite3 /data/labro.db \
                'SELECT COUNT(*) FROM project_locks' 2>/dev/null || echo 0)" != "0" ]; do
              echo "waiting..."; sleep 5
            done

            echo "Replacing container..."
            docker stop labro
            docker rm labro

            docker run -d \
              --name labro \
              --restart unless-stopped \
              --env-file /opt/labro/.env \
              -v /opt/labro/data:/data \
              "$IMAGE"

            echo "Done. labro is running $IMAGE"
          ENDSSH
